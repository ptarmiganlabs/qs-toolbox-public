name: "\U0001F4A1 Feature Request"
description: Request a new feature or enhancement for qs-toolbox-public
labels: 'template: enhancement'
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement! Please provide enough context so contributors can evaluate the request.
  - type: input
    attributes:
      label: Feature Title
      description: One-line summary of the requested feature.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the Feature
      description: Explain what you'd like to see and why.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Use Case / Motivation
      description: Describe the problem this feature would solve and who benefits.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Possible Implementation
      description: Any ideas for how this could be implemented (optional).
    validations:
      required: false
  - type: dropdown
    attributes:
      label: Which area would this touch?
      options:
        - powershell
        - apps
        - docs
        - other
    validations:
      required: true
